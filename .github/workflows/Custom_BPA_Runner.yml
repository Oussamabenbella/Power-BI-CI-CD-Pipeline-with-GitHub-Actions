name: Custom BPA Runner

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  run-bpa:
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Cache Tabular Editor
        id: cache-te
        uses: actions/cache@v3
        with:
          path: |
            TabularEditor.exe
            *.dll
          key: tabular-editor-${{ runner.os }}-v2
      
      - name: Download Tabular Editor 2.x
        if: steps.cache-te.outputs.cache-hit != 'true'
        run: |
          $url = "https://github.com/TabularEditor/TabularEditor/releases/latest/download/TabularEditor.Portable.zip"
          $output = "TabularEditor.zip"
          Invoke-WebRequest -Uri $url -OutFile $output
          Expand-Archive -Path $output -DestinationPath . -Force
          Write-Host "Tabular Editor downloaded and extracted successfully"
        shell: pwsh
      
      - name: Run BPA with Custom Ruleset
        run: |
          ./TabularEditor.exe "MonProjet.SemanticModel/definition/database.tmdl" -A "./BPA_Rule.json" `
          | Tee-Object -FilePath "./BPA_output.txt"
        shell: pwsh
      
      - name: Upload BPA Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bpa-results-custom
          path: BPA_output.txt
